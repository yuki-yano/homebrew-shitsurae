name: cask-audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Homebrew cask audit
        run: ./scripts/audit-cask.sh
